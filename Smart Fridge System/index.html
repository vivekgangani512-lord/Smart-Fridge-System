<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart Fridge</title>

    <link rel="stylesheet" href="style.css">

    <!-- Barcode Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

    <div class="fridge-bg">

        <div class="screen">

            <!-- Title -->
            <section class="hero">
                <h2>Smart Fridge <span>System</span></h2>
                <p>Scan → Add → Manage</p>
            </section>

            <!-- Alerts -->
            <section>
                <h3>Alerts</h3>
                <div id="alerts"></div>
            </section>

            <!-- Inventory -->
            <section>
                <h3>Inventory</h3>
                <div id="inventory" class="grid"></div>
            </section>

            <!-- Add Item -->
            <section>
                <h3>Add Item</h3>

                <input type="text" id="name" placeholder="Item Name">
                <input type="date" id="date">
                <input type="text" id="category" placeholder="Category">

                <button onclick="addItem()">Add Item</button>
                <button onclick="startScanner()">Scan Barcode</button>
            </section>

            <!-- Manual Barcode -->
            <section>
                <input type="text" id="barcodeInput" placeholder="Enter barcode manually">
                <button onclick="manualBarcode()">Fetch Product</button>
            </section>

            <!-- Scanner -->
            <section>
                <div id="reader"></div>
                <p id="scan-result"></p>
            </section>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
